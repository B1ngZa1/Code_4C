    // 用户状态管理
    const useUserStore = defineStore('user', {
      state: () => ({
        isLoggedIn: false,
        user: null,
        token: localStorage.getItem('token') || ''
      }),
      actions: {
        async login(username, password) {
          try {
            const response = await axios.post('/api/auth/login', { username, password })
            const { access_token } = response.data
            this.token = access_token
            localStorage.setItem('token', access_token)
            await this.getUserInfo()
            this.isLoggedIn = true
            return true
          } catch (error) {
            console.error('Login failed:', error)
            return false
          }
        },
        async register(userData) {
          try {
            await axios.post('/api/auth/register', userData)
            return true
          } catch (error) {
            console.error('Register failed:', error)
            return false
          }
        },
        async getUserInfo() {
          try {
            const response = await axios.get('/api/user/me')
            this.user = response.data
            return this.user
          } catch (error) {
            console.error('Get user info failed:', error)
            return null
          }
        },
        async checkLogin() {
          if (this.token) {
            const user = await this.getUserInfo()
            this.isLoggedIn = !!user
          }
        },
        logout() {
          this.isLoggedIn = false
          this.user = null
          this.token = ''
          localStorage.removeItem('token')
        }
      }
    })

                <p>管理您的账户信息</p>

            </template>
            <div v-if="userStore.user" class="user-info">
              <el-form :model="userForm" label-width="100px">

                  <el-input v-model="userForm.username" disabled />
                </el-form-item>
                <el-form-item label="邮箱">
                  <el-input v-model="userForm.email" disabled />
                </el-form-item>

                <el-form-item label="确认新密码" prop="confirmPassword">
                  <el-input v-model="passwordForm.confirmPassword" type="password" placeholder="请确认新密码" show-password />

                  <el-button type="primary" @click="handleUpdatePassword">修改密码</el-button>

            username: '',
            email: '',
            created_at: ''

          passwordForm: {
            currentPassword: '',
            newPassword: '',
            confirmPassword: ''
          },
          passwordRules: {
            currentPassword: [
              { required: true, message: '请输入当前密码', trigger: 'blur' }
            ],
            newPassword: [
              { required: true, message: '请输入新密码', trigger: 'blur' },
              { min: 6, message: '密码长度至少6位', trigger: 'blur' }
            ],
            confirmPassword: [
              { required: true, message: '请确认新密码', trigger: 'blur' },
              {
                validator: (rule, value, callback) => {
                  if (value !== this.passwordForm.newPassword) {
                    callback(new Error('两次输入的密码不一致'))
                  } else {
                    callback()
                  }
                },
                trigger: 'blur'
              }
            ]
          }
        }
      },
      mounted() {
        if (this.userStore.user) {
          this.userForm.username = this.userStore.user.username
          this.userForm.email = this.userStore.user.email
          this.userForm.created_at = this.userStore.user.created_at
        }
      },
      methods: {
        handleUpdatePassword() {
          ElMessage.success('密码更新成功')
          this.passwordForm.currentPassword = ''
          this.passwordForm.newPassword = ''
          this.passwordForm.confirmPassword = ''
        },
        handleLogout() {
          this.userStore.logout()
          router.push('/login')
        },
        navigateToLogin() {
          router.push('/login')
        }
      }
    }

    const LoginView = {
      template: `

          <el-card class="login-card">
            <template #header>
              <div class="login-header">
                <h2>用户登录</h2>
                <p>欢迎使用个人量化分析与交易系统</p>
              </div>
            </template>
            <el-form :model="loginForm" :rules="rules" ref="loginFormRef" label-width="80px">

                <el-input v-model="loginForm.username" placeholder="请输入用户名" />
              </el-form-item>
              <el-form-item label="密码" prop="password">
                <el-input v-model="loginForm.password" type="password" placeholder="请输入密码" show-password />
              </el-form-item>
              <el-form-item>
                <el-button type="primary" @click="handleLogin" :loading="loading" style="width: 100%">登录</el-button>
              </el-form-item>
              <el-form-item>
                <span>还没有账号？</span>
                <el-button text @click="navigateToRegister">立即注册</el-button>
              </el-form-item>
            </el-form>
          </el-card>
        </div>
      `,
      data() {
        return {
          loginForm: {
            username: '',
            password: ''
          },
          rules: {
            username: [
              { required: true, message: '请输入用户名', trigger: 'blur' }
            ],
            password: [
              { required: true, message: '请输入密码', trigger: 'blur' }
            ]
          },
          loading: false
        }
      },
      methods: {
        async handleLogin() {
          this.loading = true
          try {
            const success = await this.userStore.login(this.loginForm.username, this.loginForm.password)
            if (success) {
              router.push('/')
            } else {
              ElMessage.error('登录失败，请检查用户名和密码')
            }
          } catch (error) {
            console.error('Login failed:', error)
            ElMessage.error('登录失败，请稍后重试')
          } finally {
            this.loading = false
          }
        },
        navigateToRegister() {
          router.push('/register')
        }
      }
    }

    // 注册组件
    const RegisterView = {
      template: `
        <div class="register-container">
          <el-card class="register-card">
            <template #header>
              <div class="register-header">

                <p>创建新账号，开始量化交易之旅</p>

              <el-form-item label="邮箱" prop="email">

              </el-form-item>
              <el-form-item>
                <span>已有账号？</span>
                <el-button text @click="navigateToLogin">立即登录</el-button>
              </el-form-item>
            </el-form>
          </el-card>
        </div>
      `,
      data() {
        return {
          registerForm: {
            username: '',
            email: '',
            password: '',
            confirmPassword: ''
          },
          rules: {
            username: [
              { required: true, message: '请输入用户名', trigger: 'blur' }
            ],
            email: [
              { required: true, message: '请输入邮箱', trigger: 'blur' },
              { type: 'email', message: '请输入正确的邮箱格式', trigger: 'blur' }
            ],
            password: [
              { required: true, message: '请输入密码', trigger: 'blur' },
              { min: 6, message: '密码长度至少6位', trigger: 'blur' }
            ],
            confirmPassword: [
              { required: true, message: '请确认密码', trigger: 'blur' },
              {
                validator: (rule, value, callback) => {
                  if (value !== this.registerForm.password) {
                    callback(new Error('两次输入的密码不一致'))
                  } else {
                    callback()
                  }
                },
                trigger: 'blur'
              }
            ]
          },
          loading: false
        }
      },
      methods: {
        async handleRegister() {
          this.loading = true
          try {
            const success = await this.userStore.register(this.registerForm)
            if (success) {
              ElMessage.success('注册成功，请登录')
              router.push('/login')
            } else {
              ElMessage.error('注册失败，请稍后重试')
            }
          } catch (error) {
            console.error('Register failed:', error)
            ElMessage.error('注册失败，请稍后重试')
          } finally {
            this.loading = false
          }
        },
        navigateToLogin() {
          router.push('/login')
        }
      }
    }

    // 创建路由
    const router = createRouter({
      history: createWebHistory(),
      routes: [
        { path: '/', component: HomeView },
        { path: '/data', component: DataView },
        { path: '/strategy', component: StrategyView },
        { path: '/backtest', component: BacktestView },

        { path: '/user', component: UserView },
        { path: '/login', component: LoginView },
        { path: '/register', component: RegisterView }

    const app = createApp({

                </el-menu-item>

                  <span>回测系统</span>
                </el-menu-item>
                <el-menu-item index="/trading" @click="navigate('/trading')">

                </el-menu-item>
                <el-menu-item index="/settings" @click="navigate('/settings')">

                  <span>系统设置</span>

            <el-main>
              <router-view />
            </el-main>
          </el-container>
        </div>
      `,
      setup() {
        const userStore = useUserStore()
        const activeIndex = ref('/')

        const navigate = (path) => {
          router.push(path)
          activeIndex.value = path
        }

        onMounted(() => {
          userStore.checkLogin()
          activeIndex.value = router.currentRoute.value.path
        })

        return {
          userStore,
          activeIndex,
          navigate
        }
      }
    })

    // 使用插件
    app.use(pinia)
    app.use(router)
    app.use(ElementPlus)

    // 挂载应用
    app.mount('#app')
  </script>
